<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Call — Silicon Valley Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --y:#e8e810;
  --bg:#0d0d0b;--bg3:#161614;--bg4:#1c1c1a;
  --fg:#f2f2ed;--fg50:rgba(242,242,237,.52);
  --border:rgba(255,255,255,.07);
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'Geist Mono',monospace;
  --sans:'Plus Jakarta Sans',-apple-system,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;}
canvas#wavecv{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;background:rgba(13,13,11,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--sans);font-weight:600;font-size:14px;letter-spacing:-.02em;color:var(--fg);text-decoration:none;}
.logom{width:28px;height:28px;background:var(--y);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.back-btn{font-size:13px;color:var(--fg50);text-decoration:none;transition:color .2s;}
.back-btn:hover{color:var(--fg);}

/* MAIN */
main{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:100vh;position:relative;z-index:2;}

/* LEFT */
.contact-left{display:flex;flex-direction:column;justify-content:center;padding:140px 64px 80px 8%;border-right:1px solid var(--border);}
.contact-tag{font-family:var(--mono);font-size:11px;color:rgba(232,232,16,.55);letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px;}
.contact-h{font-family:var(--sans);font-size:clamp(48px,5.5vw,80px);font-weight:700;line-height:1.0;letter-spacing:-.03em;color:var(--fg);margin-bottom:20px;}
.contact-h span{color:var(--y);}
.contact-sub{font-size:16px;font-weight:300;color:var(--fg50);line-height:1.65;max-width:360px;margin-bottom:36px;}
.contact-perks{display:flex;flex-direction:column;gap:12px;}
.cperk{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--fg50);}
.cperk-dot{width:6px;height:6px;border-radius:50%;background:var(--y);box-shadow:0 0 6px rgba(232,232,16,.5);flex-shrink:0;display:inline-block;}
.contact-detail{display:flex;align-items:flex-start;gap:12px;}
.cd-icon{width:34px;height:34px;border-radius:8px;background:rgba(232,232,16,.07);border:1px solid rgba(232,232,16,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.cd-icon svg{width:15px;height:15px;}
.cd-text strong{font-size:13px;font-weight:500;color:var(--fg);display:block;margin-bottom:2px;}
.cd-text span{font-size:12px;color:var(--fg50);}

/* RIGHT */
.contact-right{display:flex;flex-direction:column;justify-content:center;padding:140px 8% 80px 64px;}
.form-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(242,242,237,.25);margin-bottom:32px;}
.contact-form{display:flex;flex-direction:column;gap:18px;max-width:440px;}
.form-group{display:flex;flex-direction:column;gap:7px;}
.form-label{font-family:'Inter',-apple-system,sans-serif;font-size:11px;font-weight:500;color:rgba(242,242,237,.38);letter-spacing:.04em;text-transform:uppercase;}
.form-input{
  font-family:'Inter',-apple-system,sans-serif;
  font-size:14px;font-weight:400;color:var(--fg);
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.10);
  border-radius:9px;padding:13px 16px;
  outline:none;width:100%;
  transition:border-color .2s,background .2s,box-shadow .2s;
}
.form-input::placeholder{color:rgba(242,242,237,.2);}
.form-input:focus{border-color:rgba(232,232,16,.4);background:rgba(232,232,16,.03);box-shadow:0 0 0 3px rgba(232,232,16,.06);}
textarea.form-input{resize:vertical;min-height:110px;line-height:1.6;}
.form-submit{
  margin-top:6px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--y);color:var(--bg);
  font-family:var(--sans);font-weight:300;font-size:15px;
  padding:15px 32px;border-radius:9px;border:none;cursor:pointer;width:100%;
  transition:opacity .2s,transform .2s;letter-spacing:-.01em;
}
.form-submit:hover{opacity:.88;transform:translateY(-1px);}
.form-note{font-size:12px;font-weight:300;color:rgba(242,242,237,.22);text-align:center;}

/* Success */
.form-success{display:none;text-align:center;padding:40px 0;max-width:440px;}
.success-icon{width:56px;height:56px;border-radius:50%;background:rgba(232,232,16,.1);border:1px solid rgba(232,232,16,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.form-success h3{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:10px;}
.form-success p{font-size:14px;color:var(--fg50);line-height:1.65;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.contact-left,.contact-right{animation:fadeUp .6s ease both;}
.contact-right{animation-delay:.1s;}

footer{position:relative;z-index:2;padding:22px 48px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ftlogo{font-family:var(--sans);font-weight:800;font-size:13px;letter-spacing:-.04em;}
.ftcopy{font-size:12px;color:var(--fg50);}

@media(max-width:768px){
  nav{padding:16px 20px;}
  main{grid-template-columns:1fr;}
  .contact-left{padding:100px 24px 48px;border-right:none;border-bottom:1px solid var(--border);}
  .contact-right{padding:48px 24px 80px;}
  footer{padding:20px 24px;}
}
</style>
</head>
<body>

<canvas id="wavecv"></canvas>

<nav>
  <a href="index.html" class="logo">Silicon Valley Support</a>
  <a href="index.html" class="back-btn">← Back</a>
</nav>

<main>
  <div class="contact-left">
    <div class="contact-tag">Get in touch</div>
    <h1 class="contact-h">Take support off<br>your plate.<br><span>Turn it into<br>an advantage.</span></h1>
    <p class="contact-sub">We'll get back to you within 24 hours.</p>
  </div>

  <div class="contact-right">
    <div class="form-eyebrow">Contact form</div>
    <form class="contact-form" id="contact-form">
      <div class="form-group">
        <label class="form-label" for="name">Name *</label>
        <input class="form-input" id="name" name="name" type="text" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email *</label>
        <input class="form-input" id="email" name="email" type="email" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="company">Company Name *</label>
        <input class="form-input" id="company" name="company" type="text" placeholder="Your company" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="message">What are you looking to solve?</label>
        <textarea class="form-input" id="message" name="message" placeholder="Tell us about your support setup and what's not working…"></textarea>
      </div>
      <button type="submit" class="form-submit" id="submit-btn">
        Submit
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#0d0d0b" stroke-width="1.5" stroke-linecap="round"><path d="M2 7h10M8 3l4 4-4 4"/></svg>
      </button>
    </form>

    <div class="form-success" id="form-success">
      <div class="success-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e8e810" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
      </div>
      <h3>We'll be in touch.</h3>
      <p>Thanks for reaching out.<br>Expect a reply within 24 hours.</p>
    </div>
  </div>
</main>

<footer>
  <div class="ftlogo">Silicon Valley Support</div>
  <span class="ftcopy">© 2025 Silicon Valley Support Inc.</span>
</footer>

<script>
(function(){
  const cv = document.getElementById('wavecv');
  const ctx = cv.getContext('2d');
  let W, H, t = 0;
  function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const WAVES = Array.from({length:12}, () => ({
    yBase: 0.72 + Math.random() * 0.22,
    amp: 16 + Math.random() * 26,
    freq: 0.003 + Math.random() * 0.003,
    speed: 0.35 + Math.random() * 0.55,
    op: 0.03 + Math.random() * 0.06,
    sw: 0.4 + Math.random() * 0.7,
  }));
  function frame(){
    t += 0.008; ctx.clearRect(0,0,W,H);
    WAVES.forEach(w => {
      ctx.beginPath();
      for(let x = 0; x <= W; x += 4){
        const y = H * w.yBase + Math.sin(x * w.freq + t * w.speed) * w.amp + Math.sin(x * w.freq * 1.6 + t * w.speed * 0.55) * w.amp * 0.38;
        x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.strokeStyle = `rgba(232,232,16,${w.op})`; ctx.lineWidth = w.sw; ctx.stroke();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

document.getElementById('contact-form').addEventListener('submit', async function(e){
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Sending…';
  btn.disabled = true;

  const data = {
    name:    document.getElementById('name').value,
    email:   document.getElementById('email').value,
    company: document.getElementById('company').value,
    message: document.getElementById('message').value,
  };

  try {
    const res = await fetch('https://formspree.io/f/xpqyvgbj', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ ...data, _replyto: data.email, _subject: `New enquiry from ${data.name} — ${data.company}` })
    });

    const form = document.getElementById('contact-form');
    const success = document.getElementById('form-success');
    form.style.transition = 'opacity .3s ease, transform .3s ease';
    form.style.opacity = '0';
    form.style.transform = 'translateY(-8px)';
    setTimeout(() => {
      form.style.display = 'none';
      success.style.display = 'block';
      success.style.animation = 'fadeUp .5s ease both';
    }, 300);
  } catch(err) {
    btn.textContent = 'Submit';
    btn.disabled = false;
    alert('Something went wrong. Please email daria@siliconvalleysupport.com directly.');
  }
});
</script>
</body>
</html>
